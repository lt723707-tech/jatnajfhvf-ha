<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>ИИ Бот</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #1c1c1e);
    --card: var(--tg-theme-secondary-bg-color, #2c2c2e);
    --text: var(--tg-theme-text-color, #fff);
    --hint: var(--tg-theme-hint-color, #98989f);
    --accent: var(--tg-theme-button-color, #50a8eb);
    --accent-text: var(--tg-theme-button-text-color, #fff);
    --danger:#e95f5f;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,Roboto,sans-serif;
       font-size:15px;display:flex;flex-direction:column;overflow:hidden}

  /* ── вкладки ── */
  .tabs{display:flex;background:var(--card);flex-shrink:0}
  .tabs button{flex:1;padding:12px;border:none;background:none;color:var(--hint);
    font-size:14px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent}
  .tabs button.on{color:var(--accent);border-bottom-color:var(--accent)}
  .page{flex:1;overflow-y:auto;display:none}
  .page.on{display:flex;flex-direction:column}

  /* ── чат ── */
  #chatHead{padding:8px 14px;font-size:12px;color:var(--hint);flex-shrink:0;
    display:flex;justify-content:space-between;align-items:center}
  #chatHead .clr{color:var(--danger);background:none;border:none;font-size:12px;cursor:pointer}
  #msgs{flex:1;overflow-y:auto;padding:6px 12px;display:flex;flex-direction:column;gap:8px}
  .m{max-width:86%;padding:9px 12px;border-radius:14px;line-height:1.45;
     word-wrap:break-word;overflow-wrap:break-word;white-space:pre-wrap}
  .m.u{align-self:flex-end;background:var(--accent);color:var(--accent-text);border-bottom-right-radius:4px}
  .m.a{align-self:flex-start;background:var(--card);border-bottom-left-radius:4px;white-space:normal}
  .m.a pre{background:rgba(0,0,0,.25);border-radius:8px;padding:8px;overflow-x:auto;
           font-size:12.5px;margin:6px 0;white-space:pre}
  .m.a code{background:rgba(0,0,0,.25);border-radius:4px;padding:1px 5px;font-size:13px}
  .m.a pre code{background:none;padding:0}
  .m.a blockquote{border-left:3px solid var(--accent);padding-left:8px;margin:4px 0;color:var(--hint)}
  /* пузырёк с таблицей занимает всю ширину чата */
  .m.a.wide{max-width:100%;align-self:stretch}
  .tblwrap{overflow-x:auto;margin:6px 0;border-radius:10px;
           -webkit-overflow-scrolling:touch;
           background:
             linear-gradient(90deg, var(--card) 12px, transparent) left/24px 100% no-repeat local,
             linear-gradient(270deg, var(--card) 12px, transparent) right/24px 100% no-repeat local,
             radial-gradient(farthest-side at 0 50%, rgba(0,0,0,.35), transparent) left/10px 100% no-repeat scroll,
             radial-gradient(farthest-side at 100% 50%, rgba(0,0,0,.35), transparent) right/10px 100% no-repeat scroll}
  .m.a table{border-collapse:separate;border-spacing:0;font-size:13.5px;
             width:max-content;min-width:100%}
  .m.a th,.m.a td{padding:7px 12px;text-align:left;vertical-align:top;line-height:1.4;
                  border-bottom:1px solid rgba(128,128,128,.25);
                  max-width:65vw;white-space:normal}
  .m.a th{background:rgba(128,128,128,.16);font-weight:600;white-space:nowrap;
          position:sticky;top:0}
  .m.a tr:last-child td{border-bottom:none}
  .m.a td:first-child,.m.a th:first-child{padding-left:14px}
  .m.a tr:nth-child(even) td{background:rgba(128,128,128,.07)}
  .m.err{align-self:flex-start;background:none;color:var(--danger);font-size:13px}
  .inputbar{display:flex;gap:8px;padding:10px 12px;flex-shrink:0;background:var(--bg)}
  .inputbar textarea{flex:1;resize:none;border:none;border-radius:18px;background:var(--card);
    color:var(--text);padding:11px 14px;font-size:15px;font-family:inherit;outline:none;
    max-height:110px;line-height:1.35}
  .inputbar button{width:44px;height:44px;border:none;border-radius:50%;background:var(--accent);
    color:var(--accent-text);font-size:18px;cursor:pointer;flex-shrink:0;align-self:flex-end}
  .inputbar button.stop{background:var(--danger)}
  .inputbar button:disabled{opacity:.45}
  .setup{padding:30px 20px;color:var(--hint);text-align:center;line-height:1.6}

  /* ── настройки ── */
  #pSet{padding:14px 14px 90px}
  .card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:14px}
  .label{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--hint);margin-bottom:10px}
  .prov{display:flex;gap:8px}
  .prov button{flex:1;padding:12px 4px;border:2px solid transparent;border-radius:12px;
    background:var(--bg);color:var(--text);font-size:13px;cursor:pointer;line-height:1.5}
  .prov button.sel{border-color:var(--accent)}
  .prov .em{font-size:22px;display:block}
  .prov .k{font-size:10px;color:var(--hint)}
  input[type=password],input[type=text]{width:100%;padding:12px;border:none;border-radius:10px;
    background:var(--bg);color:var(--text);font-size:15px;outline:none}
  .hint{font-size:12px;color:var(--hint);margin-top:8px;line-height:1.45}
  .hint a{color:var(--accent);text-decoration:none}
  .models{max-height:260px;overflow-y:auto;margin-top:4px}
  .model{display:flex;align-items:center;gap:10px;padding:11px 8px;border-radius:10px;cursor:pointer}
  .model:active{background:var(--bg)}
  .model .dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--hint);flex-shrink:0}
  .model.sel .dot{border-color:var(--accent);background:var(--accent);box-shadow:inset 0 0 0 3px var(--card)}
  .model .nm{flex:1;line-height:1.3}
  .row{display:flex;gap:10px}
  .btn{flex:1;padding:13px;border:none;border-radius:12px;font-size:14px;cursor:pointer;
       background:var(--bg);color:var(--danger);font-weight:600}
  .save{position:fixed;left:14px;right:14px;bottom:14px;padding:15px;border:none;border-radius:14px;
        background:var(--accent);color:var(--accent-text);font-size:16px;font-weight:600;cursor:pointer;
        display:none;z-index:5}
  .empty{color:var(--hint);font-size:13px;line-height:1.5;padding:4px}
  .badge{display:inline-block;background:var(--accent);color:var(--accent-text);
         font-size:10px;border-radius:6px;padding:2px 6px;vertical-align:middle;margin-left:6px}
</style>
</head>
<body>

<div class="tabs">
  <button id="tabChat" class="on">💬 Чат</button>
  <button id="tabSet">⚙️ Настройки</button>
</div>

<!-- ════ ЧАТ ════ -->
<div class="page on" id="pChat">
  <div id="chatHead">
    <span id="chatModel"></span>
    <button class="clr" id="chatClear">очистить</button>
  </div>
  <div id="msgs"></div>
  <div class="inputbar">
    <textarea id="inp" rows="1" placeholder="Сообщение..."></textarea>
    <button id="send">➤</button>
  </div>
</div>

<!-- ════ НАСТРОЙКИ ════ -->
<div class="page" id="pSet">
  <div class="card">
    <div class="label">Нейросеть</div>
    <div class="prov" id="prov"></div>
  </div>
  <div class="card">
    <div class="label">API-ключ</div>
    <input type="password" id="key" placeholder="Оставь пустым, чтобы не менять">
    <div class="hint" id="keyhint"></div>
  </div>
  <div class="card">
    <div class="label">Модель</div>
    <div id="searchWrap" style="display:none;margin-bottom:8px">
      <input type="text" id="search" placeholder="🔍 Поиск модели...">
    </div>
    <div class="models" id="models"></div>
  </div>
  <div class="card">
    <div class="label">Действия</div>
    <div class="row">
      <button class="btn" id="reset">🧹 Сбросить чат бота</button>
      <button class="btn" id="resetkey">🗑 Удалить ключ</button>
    </div>
  </div>
</div>

<button class="save" id="save">Сохранить</button>

<script>
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if (tg) { tg.ready(); tg.expand(); }

const PROVIDERS = {
  gemini: {name:"Gemini",  em:"✨", url:"https://aistudio.google.com/apikey",
           base:"https://generativelanguage.googleapis.com/v1beta"},
  openai: {name:"ChatGPT", em:"🤖", url:"https://platform.openai.com/api-keys",
           base:"https://api.openai.com/v1"},
  llama:  {name:"Llama",   em:"🦙", url:"https://console.groq.com/keys",
           base:"https://api.groq.com/openai/v1"},
};
const SYS = "Ты — дружелюбный ассистент. Отвечай на языке пользователя, форматируй в Markdown.";

// ── состояние из URL (?z=zlib+base64 или ?d=base64) ──
function b64bytes(s){
  s = s.replace(/-/g,"+").replace(/_/g,"/"); while(s.length % 4) s += "=";
  return Uint8Array.from(atob(s), c=>c.charCodeAt(0));
}
async function readState(){
  const q = new URLSearchParams(location.search);
  try{
    if(q.get("d"))                        // обычный формат — работает везде
      return JSON.parse(new TextDecoder().decode(b64bytes(q.get("d"))));
    if(q.get("z")){                       // сжатый формат (большая история чата)
      if(typeof DecompressionStream === "undefined"){
        alert("⚠️ Телефон не поддерживает распаковку данных. Обнови Telegram/WebView.");
        return {};
      }
      const ds = new DecompressionStream("deflate");
      const stream = new Blob([b64bytes(q.get("z"))]).stream().pipeThrough(ds);
      return JSON.parse(await new Response(stream).text());
    }
  }catch(e){ console.error("readState:", e); }
  return {};
}
let st = {};   // {p, m, k:[...], keys:{pid:key}, models:[[id,name],...], h:[{role,content}]}
let selProv = null, selModel = null, initProv = null, initModel = null;
const hasKey = pid => (st.k || []).includes(pid);
const keyOf  = pid => (st.keys || {})[pid] || null;
const modelName = id => { const f = (st.models||[]).find(x=>x[0]===id); return f ? f[1] : id; };

// ════════════ MARKDOWN ════════════
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function mdTable(lines){
  const rows = [];
  for(const ln of lines){
    const t = ln.trim().replace(/^\||\|$/g,"");
    if(/^[\s|:\-]+$/.test(t)){ rows.push(null); continue; }
    rows.push(t.split("|").map(c=>c.trim()));
  }
  const real = rows.filter(r=>r);
  if(!real.length) return esc(lines.join("\n"));
  let h = '<div class="tblwrap"><table>';
  let header = rows.length > 1 && rows[1] === null;   // вторая строка — разделитель
  rows.forEach((r,i)=>{
    if(r === null) return;
    const tag = (header && i === 0) ? "th" : "td";
    h += "<tr>" + r.map(c=>{
      let cell = esc(c)
        .replace(/\*\*(.+?)\*\*/g,"<b>$1</b>")
        .replace(/__(.+?)__/g,"<u>$1</u>")
        .replace(/~~(.+?)~~/g,"<s>$1</s>")
        .replace(/`([^`]+)`/g,"<code>$1</code>");
      return `<${tag}>${cell}</${tag}>`;
    }).join("") + "</tr>";
  });
  return h + "</table></div>";
}

function md(s){
  const stash = [];
  const keep = h => { stash.push(h); return "\x00"+(stash.length-1)+"\x00"; };
  s = s.replace(/```[\w+#./-]*\n?([\s\S]*?)(?:```|$)/g, (_,c)=>keep("<pre>"+esc(c.replace(/\n$/,""))+"</pre>"));
  s = s.replace(/`([^`\n]+)`/g, (_,c)=>keep("<code>"+esc(c)+"</code>"));
  // таблицы: подряд идущие строки с | и строкой-разделителем
  {
    const lines = s.split("\n"), out = []; let buf = [];
    const isRow = ln => ln.includes("|") && (ln.match(/\|/g)||[]).length >= 2;
    const flush = () => {
      if(buf.length >= 2 && buf.some(b=>/^[\s|:\-]+$/.test(b.trim())))
        out.push(keep(mdTable(buf)));
      else out.push(...buf);
      buf = [];
    };
    for(const ln of lines){ if(isRow(ln)) buf.push(ln); else { flush(); out.push(ln); } }
    flush();
    s = out.join("\n");
  }
  s = esc(s);
  s = s.replace(/\*\*\*([\s\S]+?)\*\*\*/g,"<b><i>$1</i></b>");
  s = s.replace(/\*\*([\s\S]+?)\*\*/g,"<b>$1</b>");
  s = s.replace(/__([\s\S]+?)__/g,"<u>$1</u>");
  s = s.replace(/~~([\s\S]+?)~~/g,"<s>$1</s>");
  s = s.replace(/(^|[^\w*])\*([^*\n]+)\*(?![\w*])/g,"$1<i>$2</i>");
  s = s.replace(/^#{1,6}\s+(.+)$/gm,"<b>$1</b>");
  s = s.replace(/^\s*([-*_])\s*(\1\s*){2,}$/gm,"──────────");
  s = s.replace(/^&gt;\s?(.*)$/gm,"<blockquote>$1</blockquote>");
  s = s.replace(/<\/blockquote>\n<blockquote>/g,"\n");
  s = s.replace(/^\s*[-*+]\s+/gm,"• ");
  s = s.replace(/\n/g,"<br>");
  // восстанавливаем тайник (итеративно — внутри таблиц могут быть вложенные куски)
  while(/\x00\d+\x00/.test(s)) s = s.replace(/\x00(\d+)\x00/g,(_,i)=>stash[+i]);
  // убираем лишние <br> вокруг блочных элементов
  s = s.replace(/<br>(<div class="tblwrap">)/g,"$1").replace(/(<\/div>)<br>/g,"$1");
  return s;
}
const stripThink = t => t
  .replace(/<(think|thinking|reasoning|thought)>[\s\S]*?<\/\1>/gi,"")
  .replace(/<(think|thinking|reasoning|thought)>[\s\S]*$/gi,"")
  .replace(/^[\s\S]*?<\/(think|thinking|reasoning|thought)>/i,"")
  .trim();

// ════════════ ЧАТ ════════════
const msgsBox = document.getElementById("msgs");
const inp = document.getElementById("inp");
const sendBtn = document.getElementById("send");
let hist = [];           // [{role, content}]
let aborter = null;

function initHist(){
  // история из бота (свежая) приоритетнее локальной
  const botHist = st.h || [];
  let local = [];
  try{ local = JSON.parse(localStorage.getItem("hist")||"[]"); }catch(e){}
  if(botHist.length){
    hist = botHist;
    saveHist();
  } else hist = local;
}

function saveHist(){ try{ localStorage.setItem("hist", JSON.stringify(hist.slice(-30))); }catch(e){} }
function addBubble(cls, html){
  const d = document.createElement("div");
  d.className = "m "+cls;
  d.innerHTML = html;
  if(html.includes('class="tblwrap"')) d.classList.add("wide");
  msgsBox.appendChild(d);
  msgsBox.scrollTop = msgsBox.scrollHeight;
  return d;
}
// после стриминга пузырёк мог получить таблицу — обновляем класс
function refreshWide(bub){
  bub.classList.toggle("wide", !!bub.querySelector(".tblwrap"));
}
function drawChat(){
  msgsBox.innerHTML = "";
  if(!selProv || !keyOf(selProv) || !selModel){
    msgsBox.innerHTML = `<div class="setup">Чтобы общаться прямо здесь, нужны
      нейросеть, ключ и модель.<br><br>Открой вкладку <b>⚙️ Настройки</b> 🙂</div>`;
    document.getElementById("chatModel").textContent = "не настроено";
    return;
  }
  document.getElementById("chatModel").textContent =
    PROVIDERS[selProv].em + " " + modelName(selModel);
  for(const h of hist)
    addBubble(h.role === "user" ? "u" : "a", h.role === "user" ? esc(h.content) : md(h.content));
}

async function* sse(resp){
  const rd = resp.body.getReader(), dec = new TextDecoder();
  let buf = "";
  while(true){
    const {done, value} = await rd.read();
    if(done) break;
    buf += dec.decode(value, {stream:true});
    const lines = buf.split("\n"); buf = lines.pop();
    for(const ln of lines){
      const t = ln.trim();
      if(t.startsWith("data:")){
        const d = t.slice(5).trim();
        if(d && d !== "[DONE]") yield d;
      }
    }
  }
}

async function sendMsg(){
  const text = inp.value.trim();
  if(!text || aborter) return;
  if(!selProv || !keyOf(selProv) || !selModel){ drawChat(); return; }
  inp.value = ""; inp.style.height = "auto";
  hist.push({role:"user", content:text}); saveHist();
  addBubble("u", esc(text));
  const bub = addBubble("a", "…");
  sendBtn.textContent = "■"; sendBtn.classList.add("stop");
  aborter = new AbortController();

  const p = PROVIDERS[selProv], key = keyOf(selProv);
  let answer = "";
  try{
    let resp;
    if(selProv === "gemini"){
      const contents = hist.map(h=>({role:h.role==="user"?"user":"model", parts:[{text:h.content}]}));
      resp = await fetch(`${p.base}/models/${selModel}:streamGenerateContent?alt=sse`,{
        method:"POST", signal:aborter.signal,
        headers:{"Content-Type":"application/json","x-goog-api-key":key},
        body:JSON.stringify({system_instruction:{parts:[{text:SYS}]}, contents})});
    }else{
      const messages = [{role:"system",content:SYS}, ...hist];
      resp = await fetch(`${p.base}/chat/completions`,{
        method:"POST", signal:aborter.signal,
        headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
        body:JSON.stringify({model:selModel, stream:true, messages})});
    }
    if(!resp.ok){
      const s = resp.status;
      throw new Error(s===401||s===403 ? "🔑 Ключ не подходит."
        : s===429 ? "⏳ Лимит запросов — подожди немного."
        : s===404 ? "🤔 Модель не найдена."
        : s>=500 ? "😴 Сервис отдыхает, попробуй позже." : "😕 Ошибка "+s);
    }
    for await(const d of sse(resp)){
      let obj; try{ obj = JSON.parse(d); }catch(e){ continue; }
      let delta = "";
      if(selProv === "gemini"){
        for(const c of obj.candidates||[]) for(const pt of (c.content||{}).parts||[]) delta += pt.text||"";
      }else{
        for(const c of obj.choices||[]) delta += (c.delta||{}).content||"";
      }
      if(delta){
        answer += delta;
        bub.textContent = answer.length > 3000 ? "…"+answer.slice(-3000) : answer;
        msgsBox.scrollTop = msgsBox.scrollHeight;
      }
    }
    answer = stripThink(answer);
    if(!answer){ bub.className = "m err"; bub.textContent = "🤷 Модель ничего не ответила."; hist.pop(); saveHist(); }
    else{ bub.innerHTML = md(answer); refreshWide(bub); hist.push({role:"assistant", content:answer}); saveHist(); }
  }catch(e){
    if(e.name === "AbortError"){
      answer = stripThink(answer);
      if(answer){ bub.innerHTML = md(answer)+" ⏹"; refreshWide(bub); hist.push({role:"assistant",content:answer}); }
      else { bub.className = "m err"; bub.textContent = "⏹ Остановлено."; hist.pop(); }
      saveHist();
    }else{
      bub.className = "m err";
      bub.textContent = e.message.startsWith("Failed") || e.message.includes("fetch")
        ? "🌐 Нет связи с сервисом ИИ. Если он заблокирован в твоей стране — включи VPN или пиши боту в чат (бот ходит через свой прокси)."
        : e.message;
      hist.pop(); saveHist();
    }
  }finally{
    aborter = null;
    sendBtn.textContent = "➤"; sendBtn.classList.remove("stop");
    msgsBox.scrollTop = msgsBox.scrollHeight;
  }
}
sendBtn.onclick = () => { if(aborter){ aborter.abort(); } else sendMsg(); };
inp.addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendMsg(); }
});
inp.addEventListener("input", () => { inp.style.height = "auto"; inp.style.height = Math.min(inp.scrollHeight,110)+"px"; });
document.getElementById("chatClear").onclick = () => { hist = []; saveHist(); drawChat(); };

// ════════════ НАСТРОЙКИ ════════════
const provBox = document.getElementById("prov");
function drawProv(){
  provBox.innerHTML = "";
  for(const [pid,p] of Object.entries(PROVIDERS)){
    const b = document.createElement("button");
    b.className = pid === selProv ? "sel" : "";
    b.innerHTML = `<span class="em">${p.em}</span>${p.name}<br>
                   <span class="k">${hasKey(pid) ? "🔑 ключ есть" : "нет ключа"}</span>`;
    b.onclick = () => { selProv = pid; drawProv(); drawKeyHint(); drawModels(); };
    provBox.appendChild(b);
  }
}
function drawKeyHint(){
  const h = document.getElementById("keyhint");
  if(!selProv){ h.innerHTML = "Сначала выбери нейросеть."; return; }
  const p = PROVIDERS[selProv];
  h.innerHTML = (hasKey(selProv)
      ? `Ключ для ${p.name} уже сохранён — введи новый, только если хочешь заменить. `
      : `⚠️ Для ${p.name} нужен ключ. `)
    + `<a href="${p.url}" target="_blank">Получить ключ</a>`;
}
const modelsBox = document.getElementById("models");
function drawModels(filter){
  modelsBox.innerHTML = "";
  const list = st.models || [];
  if(selProv !== initProv){
    modelsBox.innerHTML = `<div class="empty">Сменил нейросеть? Нажми «Сохранить» — бот проверит
      модели и пришлёт список в чат.</div>`;
    document.getElementById("searchWrap").style.display = "none";
    return;
  }
  if(!list.length){
    modelsBox.innerHTML = `<div class="empty">Список моделей ещё не загружен. Отправь боту /models.</div>`;
    return;
  }
  document.getElementById("searchWrap").style.display = list.length > 8 ? "" : "none";
  const f = (filter||"").toLowerCase();
  for(const [id,name] of list){
    if(f && !name.toLowerCase().includes(f) && !id.toLowerCase().includes(f)) continue;
    const d = document.createElement("div");
    d.className = "model" + (id === selModel ? " sel" : "");
    d.innerHTML = `<span class="dot"></span><span class="nm">${name}
      ${id === initModel ? '<span class="badge">текущая</span>' : ""}</span>`;
    d.onclick = () => { selModel = id; drawModels(f); drawChat(); };
    modelsBox.appendChild(d);
  }
}
document.getElementById("search").oninput = e => drawModels(e.target.value);

function send(payload){
  const data = JSON.stringify(payload);
  if(tg && tg.sendData) tg.sendData(data);
  else alert("Открой панель через Telegram.\n\n"+data);
}
function confirmAsk(text, cb){
  if(tg && tg.showConfirm) tg.showConfirm(text, ok => ok && cb());
  else if(confirm(text)) cb();
}
document.getElementById("reset").onclick = () =>
  confirmAsk("Сбросить чат бота? Он забудет весь диалог.", () => send({action:"reset"}));
document.getElementById("resetkey").onclick = () =>
  confirmAsk("Удалить сохранённый API-ключ?", () => send({action:"resetkey"}));
document.getElementById("save").onclick = () => {
  if(!selProv){ (tg&&tg.showAlert?tg.showAlert:alert)("Выбери нейросеть 🙂"); return; }
  const key = document.getElementById("key").value.trim();
  if(!hasKey(selProv) && !key){
    (tg&&tg.showAlert?tg.showAlert:alert)("Для этой нейросети нужен API-ключ — введи его."); return;
  }
  const payload = {action:"save", provider:selProv};
  if(key) payload.key = key;
  if(selModel && selModel !== initModel && selProv === initProv) payload.model = selModel;
  send(payload);
};

// ── вкладки ──
const tabChat = document.getElementById("tabChat"), tabSet = document.getElementById("tabSet");
function switchTab(chat){
  tabChat.classList.toggle("on", chat); tabSet.classList.toggle("on", !chat);
  document.getElementById("pChat").classList.toggle("on", chat);
  document.getElementById("pSet").classList.toggle("on", !chat);
  document.getElementById("save").style.display = chat ? "none" : "block";
}
tabChat.onclick = () => switchTab(true);
tabSet.onclick  = () => switchTab(false);

// ── запуск: читаем состояние (возможно, сжатое) и рисуем всё ──
readState().then(s => {
  st = s || {};
  selProv = st.p || null; selModel = st.m || null;
  initProv = st.p || null; initModel = st.m || null;
  initHist();
  drawProv(); drawKeyHint(); drawModels(); drawChat();
  switchTab(!(selProv && keyOf(selProv) && selModel));  // не настроено → сразу настройки
});
</script>
